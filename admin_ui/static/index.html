<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR AI Assistant Admin</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <section id="loginView" class="login-shell">
    <form id="loginForm" class="login-panel">
      <h1>VR AI Assistant Admin</h1>
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
      <p id="loginError" class="error" role="alert"></p>
    </form>
  </section>

  <div id="appView" class="app-shell" hidden>
    <header class="topbar">
      <strong>VR AI Assistant Admin</strong>
      <div id="serviceStatus" class="status-strip" aria-live="polite"></div>
      <button id="logoutButton" type="button">Sign out</button>
    </header>
    <nav class="tabs" aria-label="Admin views">
      <button type="button" data-view="ingest" aria-selected="true">Ingest</button>
      <button type="button" data-view="jobs" aria-selected="false">Jobs</button>
      <button type="button" data-view="documents" aria-selected="false">Documents</button>
    </nav>

    <main>
      <section id="ingestView" data-view-panel="ingest">
        <div class="segmented" role="group" aria-label="Ingestion source">
          <button type="button" data-source="upload" aria-pressed="true">Browser upload</button>
          <button type="button" data-source="corpus" aria-pressed="false">Server corpus</button>
        </div>

        <section id="uploadPanel">
          <div class="upload-actions">
            <label class="file-button">Choose files<input id="fileInput" type="file" multiple accept=".pdf,.docx,.epub,.txt,.md"></label>
            <label class="file-button">Choose folder<input id="folderInput" type="file" multiple webkitdirectory></label>
            <button id="clearStaging" type="button">Clear</button>
          </div>
          <div class="table-wrap"><table id="stagingTable"><thead><tr>
            <th>File</th><th>Kind</th><th>Subject</th><th>Grade</th><th>Language</th><th>Lab</th><th>OCR</th><th>Status</th><th></th>
          </tr></thead><tbody></tbody></table></div>
          <button id="queueUpload" type="button" disabled>Queue upload</button>
        </section>

        <section id="corpusPanel" hidden>
          <label for="corpusSubtree">Relative subtree</label>
          <input id="corpusSubtree" placeholder="Leave empty for the full corpus">
          <label><input id="corpusOcr" type="checkbox"> OCR scanned files</label>
          <label><input id="corpusPrune" type="checkbox"> Prune documents absent from a full-root scan</label>
          <div class="command-row">
            <button id="previewCorpus" type="button">Preview</button>
            <button id="queueCorpus" type="button" disabled>Queue corpus job</button>
          </div>
          <div id="corpusPreview" aria-live="polite"></div>
        </section>
      </section>

      <section id="jobsView" data-view-panel="jobs" hidden>
        <div class="table-wrap"><table id="jobsTable"><thead><tr>
          <th>Status</th><th>Kind</th><th>Progress</th><th>Current item</th><th>Created</th><th>Actions</th>
        </tr></thead><tbody></tbody></table></div>
        <section id="jobDetails" hidden aria-live="polite"></section>
      </section>

      <section id="documentsView" data-view-panel="documents" hidden>
        <div id="corpusSummary"></div>
        <div class="filters">
          <input id="documentSearch" aria-label="Filter by filename" placeholder="Filter filename">
          <select id="documentType" aria-label="Filter by document type"><option value="">All types</option><option value="textbook">Textbook</option><option value="lab_instruction">Lab instruction</option></select>
          <select id="documentSubject" aria-label="Filter by subject"><option value="">All subjects</option><option value="physics">Physics</option><option value="chemistry">Chemistry</option><option value="biology">Biology</option></select>
          <select id="documentGrade" aria-label="Filter by grade"><option value="">All grades</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select>
          <select id="documentLanguage" aria-label="Filter by language"><option value="">All languages</option><option>ru</option><option>kk</option><option>en</option></select>
        </div>
        <div class="table-wrap"><table id="documentsTable"><thead><tr>
          <th>Filename</th><th>Type</th><th>Subject</th><th>Grade</th><th>Language</th><th>Chunks</th><th></th>
        </tr></thead><tbody></tbody></table></div>
      </section>
    </main>
  </div>

  <dialog id="confirmDialog" aria-labelledby="confirmMessage">
    <form method="dialog">
      <p id="confirmMessage"></p>
      <div class="command-row"><button value="cancel">Cancel</button><button id="confirmAction" value="confirm">Confirm</button></div>
    </form>
  </dialog>
  <div id="toast" role="status" aria-live="polite"></div>
</body>
</html>
