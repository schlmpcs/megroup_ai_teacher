services:
  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - SCENARIOS_DIR=/app/scenarios
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_BASE_URL=http://embedder:8080
      # In-repo voice sidecar over the internal compose network (plain HTTP).
      - VOICE_BASE_URL=http://voice:8001
      # OmniVoice requires Transformers 5.x and is isolated from the Qwen TTS
      # environment, which is pinned to Transformers 4.57.3.
      - VOICE_KK_OMNIVOICE_BASE_URL=http://voice-omnivoice:8003
      - VOICE_TTS_RU_DEFAULT_BACKEND=${VOICE_TTS_RU_DEFAULT_BACKEND:-supertonic}
      - VOICE_TTS_KK_DEFAULT_BACKEND=${VOICE_TTS_KK_DEFAULT_BACKEND:-omnivoice}
    volumes:
      # Mount scenarios so lab descriptions can be edited without a rebuild.
      - ./scenarios:/app/scenarios:ro
    depends_on:
      - qdrant
      - embedder
      - voice
      - voice-omnivoice
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); "]
      interval: 30s
      timeout: 5s
      retries: 3

  # Local hybrid vector store (dense + sparse via Query API RRF).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # GPU bge-m3 embedding sidecar. Requires the NVIDIA Container Toolkit on the
  # host. On first start the model is downloaded and loaded into the GPU, so the
  # initial boot is slow (the hf_cache volume persists it across restarts).
  embedder:
    build: ./embedder
    ports:
      - "8080:8080"
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/health'); "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s

  # GPU STT/TTS sidecar (in-repo; formerly the external ../vrrag_ttsstt service).
  # STT = Whisper large-v3-turbo (ru/kk/auto, + kk LoRA); Russian TTS defaults
  # to Supertonic with Qwen3-TTS 0.6B available explicitly; MMS is the Kazakh
  # fallback. The higher-quality fixed young male Kazakh voice lives in the
  # isolated `voice-omnivoice` service below.
  # Requires the NVIDIA Container Toolkit on the host. Listens on 8001
  # internally; the api reaches it at http://voice:8001 over plain HTTP. First
  # boot downloads several GB of models into the voice_hf_cache volume.
  voice:
    build: ./voice
    ports:
      # Host-mapped for direct testing; the api uses the internal 8001 port.
      - "8002:8001"
    volumes:
      - voice_hf_cache:/models/hf_cache
    environment:
      - TTS_RU_BACKEND=${TTS_RU_BACKEND:-supertonic}
      - TTS_RU_BACKENDS=${TTS_RU_BACKENDS:-supertonic,qwen}
      - TTS_RU_QWEN_MODEL=${TTS_RU_QWEN_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice}
      - TTS_RU_QWEN_SPEAKER=${TTS_RU_QWEN_SPEAKER:-Aiden}
      - TTS_RU_QWEN_DTYPE=${TTS_RU_QWEN_DTYPE:-bfloat16}
      - TTS_RU_QWEN_ATTENTION=${TTS_RU_QWEN_ATTENTION:-sdpa}
      - TTS_RU_QWEN_MAX_NEW_TOKENS=${TTS_RU_QWEN_MAX_NEW_TOKENS:-2048}
      - TTS_RU_SUPERTONIC_VOICE_STYLE=${TTS_RU_SUPERTONIC_VOICE_STYLE:-M3}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8001/health'); "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s

  # Kazakh TTS uses a separate service because OmniVoice requires Transformers
  # 5.x while the Russian Qwen backend above is pinned to Transformers 4.57.3.
  # It exposes only the fixed `male, young adult, moderate pitch` profile.
  voice-omnivoice:
    build: ./voice_omnivoice
    ports:
      - "8003:8003"
    volumes:
      - omnivoice_hf_cache:/models/hf_cache
    environment:
      - OMNIVOICE_MODEL=${OMNIVOICE_MODEL:-shyngys879/KazakhTTS-OmniVoice}
      - OMNIVOICE_INSTRUCT=${OMNIVOICE_INSTRUCT:-male, young adult, moderate pitch}
      - OMNIVOICE_STEPS=${OMNIVOICE_STEPS:-24}
      # The server's direct Hugging Face route intermittently returns 504 for
      # the mandatory Higgs audio tokenizer. This public mirror is configurable
      # through .env and used only by the isolated OmniVoice container.
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8003/health'); "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

volumes:
  qdrant_data:
  hf_cache:
  voice_hf_cache:
  omnivoice_hf_cache:
